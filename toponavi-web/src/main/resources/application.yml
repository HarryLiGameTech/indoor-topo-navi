spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/toponavi}
    username: ${SPRING_DATASOURCE_USERNAME:toponavi}
    password: ${SPRING_DATASOURCE_PASSWORD:toponavi}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

platform:
  jwt:
    secret: ${JWT_SECRET:changeme_replace_in_production_with_a_strong_random_secret}
    expiration-ms: 86400000   # 24 hours
  github:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}
    installation-id: ${GITHUB_APP_INSTALLATION_ID}
    org-name: ${GITHUB_ORG_NAME:toponavi-map-store}

server:
  port: 8080

